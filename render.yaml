# Render Blueprint — MarinerX Quant Command Center
# Deploy: Dashboard -> New -> Blueprint -> connect marinerxcapital/marinerx-quant-cc
# Secrets: set in dashboard when prompted (sync: false) or via envVarGroups below.

envVarGroups:
  - name: marinerx-production-secrets
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false

services:
  - type: web
    name: marinerx-labs-api
    runtime: docker
    plan: starter
    region: virginia
    repo: https://github.com/marinerxcapital/marinerx-quant-cc
    branch: master
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVarGroups:
      - name: marinerx-production-secrets
    envVars:
      - key: APP_ENV
        value: production
      - key: SERVICE_MODE
        value: web
      - key: ENABLE_LIVE_EXECUTION
        value: "false"
      - key: OBJECT_STORAGE_BACKEND
        value: r2
      - key: DATA_DIR
        value: /data
      - key: LOG_DIR
        value: /data/logs
      - key: PARQUET_DIR
        value: /data/parquet
      - key: REPORTS_DIR
        value: /data/reports
      - key: LOCAL_OBJECT_STORAGE_DIR
        value: /data/objects
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PUBLIC_FRONTEND_URL
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
    dockerCommand: python main.py run --interface web

  - type: worker
    name: marinerx-labs-worker
    runtime: docker
    plan: starter
    region: virginia
    repo: https://github.com/marinerxcapital/marinerx-quant-cc
    branch: master
    autoDeployTrigger: commit
    envVarGroups:
      - name: marinerx-production-secrets
    envVars:
      - key: APP_ENV
        value: production
      - key: SERVICE_MODE
        value: worker
      - key: ENABLE_LIVE_EXECUTION
        value: "false"
      - key: OBJECT_STORAGE_BACKEND
        value: r2
      - key: DATA_DIR
        value: /data
      - key: LOG_DIR
        value: /data/logs
      - key: PARQUET_DIR
        value: /data/parquet
      - key: REPORTS_DIR
        value: /data/reports
      - key: LOCAL_OBJECT_STORAGE_DIR
        value: /data/objects
    dockerCommand: python main.py run --interface worker